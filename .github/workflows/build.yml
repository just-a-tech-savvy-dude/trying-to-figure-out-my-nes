name: Build Custom nesDS
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Your Code
        uses: actions/checkout@v4
        with:
          path: user_code

      - name: Checkout Base System
        uses: actions/checkout@v4
        with:
          repository: DS-Homebrew/NesDS
          path: base_repo

      - name: Assemble and Compile
        run: |
          # Fix: Copy menu.c directly from your root directory
          cp user_code/menu.c base_repo/common/menu.c
          
          cd base_repo
          
          # Build using the devkitPro container directly on the runner
          docker run --rm -v "${PWD}":/project devkitpro/devkitarm make

      - name: Upload Finished File
        uses: actions/upload-artifact@v4
        with:
          name: nesDS-Speedrun-Timer
          path: base_repo/*.nds
