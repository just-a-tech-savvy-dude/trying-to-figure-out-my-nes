name: Build Custom nesDS
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    container: devkitpro/devkitarm:latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Force Direct Compile
        run: |
          export DEVKITPRO=/opt/devkitpro
          export DEVKITARM=$DEVKITPRO/devkitARM
          export PATH=$DEVKITARM/bin:$PATH
          arm-none-eabi-gcc -O2 -mthumb -mthumb-interwork -mcpu=arm946e-s -Iinclude -Icommon -c common/menu.c -o menu.o
          arm-none-eabi-objcopy -O binary menu.o nesDS.nds
          
      - name: Upload Finished File
        uses: actions/upload-artifact@v4
        with:
          name: nesDS-Speedrun-Timer
          path: ./nesDS.nds
